<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oma viihde - Prototyyppi</title>
    <style>
        :root {
            --primary-color: #007bff;
            --accent-color: #ff4757;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --sidebar-width: 320px;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: #1a1a1a;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { font-size: 1.5rem; font-weight: bold; }
        nav a { color: #ccc; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        nav a:hover { color: white; }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
            gap: 2rem;
        }

        @media (max-width: 1024px) { .container { flex-direction: column; } }

        aside { width: var(--sidebar-width); flex-shrink: 0; }
        @media (max-width: 1024px) { aside { width: 100%; } }

        .filter-section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .filter-section h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }

        .chip-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
        .genre-item { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }

        .chip {
            flex-grow: 1;
            padding: 0.5rem 1rem;
            background: #eee;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 2px solid transparent;
            transition: all 0.2s;
            text-align: center;
        }
        .chip.active { background: var(--primary-color); color: white; }

        .add-section-btn {
            background: #e9ecef; border: none; border-radius: 50%; width: 32px; height: 32px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--primary-color); flex-shrink: 0;
        }

        /* Sidebar Section List */
        .sidebar-section-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .sidebar-section-item {
            display: flex; align-items: center; background: #f8f9fa;
            padding: 0.6rem; border-radius: 8px; border: 1px solid #eee;
            transition: background 0.2s;
        }
        .sidebar-section-item.dragging { opacity: 0.4; background: #e9ecef; }
        .sidebar-section-item.drag-over { border-top: 2px solid var(--primary-color); }
        
        .drag-handle { cursor: grab; margin-right: 10px; color: #999; user-select: none; }
        .section-checkbox { margin-right: 10px; width: 16px; height: 16px; cursor: pointer; }
        .section-name { flex-grow: 1; cursor: pointer; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .section-name:hover { color: var(--primary-color); text-decoration: underline; }
        
        .sidebar-remove-btn {
            background: transparent; border: none; color: #ccc; cursor: pointer;
            padding: 4px; font-size: 1rem; transition: color 0.2s;
        }
        .sidebar-remove-btn:hover { color: var(--accent-color); }

        main { flex-grow: 1; }
        .hero {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; padding: 3rem; border-radius: var(--border-radius); margin-bottom: 2rem;
        }

        .content-section { margin-bottom: 4rem; scroll-margin-top: 100px; }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid #eee;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
        
        .card {
            background: var(--card-bg); border-radius: var(--border-radius);
            overflow: hidden; box-shadow: var(--shadow); transition: transform 0.3s;
            display: flex; flex-direction: column; position: relative;
        }
        .card:hover { transform: translateY(-5px); }
        .card-img { height: 140px; background: #ddd; background-size: cover; background-position: center; }
        
        .fav-btn {
            position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8);
            border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #ccc;
        }
        .fav-btn.active { color: var(--accent-color); background: white; }

        .card-content { padding: 1.25rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-type { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--primary-color); margin-bottom: 0.5rem; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 0.5rem; }
        .card-genre { font-size: 0.8rem; color: #666; margin-bottom: 0.75rem; }
        .card-desc { font-size: 0.85rem; color: #444; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .empty-state { text-align: center; padding: 2rem; color: #888; font-style: italic; grid-column: 1 / -1; }
        .hidden { display: none !important; }

        .toggle-group label { display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer; font-size: 0.9rem; }
        .toggle-group input[type="checkbox"] { margin-right: 0.75rem; width: 18px; height: 18px; }
    </style>
</head>
<body>

    <header>
        <h1>Oma viihde</h1>
        <nav>
            <a href="#">Etusivu</a>
            <a href="#">Kirjasto</a>
            <a href="#">Omat asetukset</a>
        </nav>
    </header>

    <div class="container">
        <aside>
            <div class="filter-section">
                <h3>Lajityypit</h3>
                <div class="chip-group" id="genre-filters"></div>

                <h3>Palvelut</h3>
                <div class="chip-group" id="service-filters" style="flex-direction: row; flex-wrap: wrap;">
                    <div class="chip" data-value="Linear TV">TV</div>
                    <div class="chip" data-value="Suoratoisto">Stream</div>
                    <div class="chip" data-value="Vuokraelokuva">Vuokra</div>
                </div>

                <h3>Asetukset</h3>
                <div class="toggle-group">
                    <label><input type="checkbox" id="toggle-favorites"> Näytä vain suosikit</label>
                    <label><input type="checkbox" id="toggle-highlight"> Korosta suoratoistoa</label>
                </div>
            </div>

            <div class="filter-section">
                <h3>Näkymän hallinta</h3>
                <p style="font-size: 0.75rem; color: #888; margin-bottom: 1rem;">Järjestele raahaamalla ⠿, klikkaa nimeä navigoidaksesi.</p>
                <div class="sidebar-section-list" id="sidebar-sections">
                    <!-- Generoidaan JS:llä -->
                </div>
            </div>
        </aside>

        <main id="sections-container">
            <div class="hero">
                <h2>Tervetuloa takaisin!</h2>
                <p>Hallitse näkymääsi vasemman sivupalkin ohjauspaneelista.</p>
            </div>

            <div id="dynamic-sections"></div>
        </main>
    </div>

    <script>
        const genres = ["Elokuvat", "Sarjat", "Urheilu", "Lapset", "Dokumentit", "Viihde", "Uutiset"];
        
        const contentItems = [
            { id: 1, title: "Napapiirin sankarit", type: "Suoratoisto", genre: "Elokuvat", desc: "Klassinen suomalainen komedia seikkailusta halki Lapin.", recommended: true },
            { id: 4, title: "Dune: Osa kaksi", type: "Vuokraelokuva", genre: "Elokuvat", desc: "Eeppinen tieteisseikkailu nyt vuokrattavissa.", recommended: true },
            { id: 9, title: "Barbie", type: "Vuokraelokuva", genre: "Elokuvat", desc: "Värikäs ja ajatuksia herättävä hitti vuodelta 2023.", recommended: false },
            { id: 17, title: "Sisu", type: "Suoratoisto", genre: "Elokuvat", desc: "Toiminnantäyteinen selviytymistarina Lapin erämaassa.", recommended: true },
            { id: 18, title: "Kuolleet lehdet", type: "Vuokraelokuva", genre: "Elokuvat", desc: "Aki Kaurismäen palkittu rakkaustarina.", recommended: false },
            { id: 8, title: "Sorjonen", type: "Suoratoisto", genre: "Sarjat", desc: "Synkkä rikosdraama sijoittuu Lappeenrannan maisemiin.", recommended: true },
            { id: 12, title: "The Last of Us", type: "Suoratoisto", genre: "Sarjat", desc: "Selviytymistarina maailmanlopun jälkeisessä maailmassa.", recommended: true },
            { id: 19, title: "Munkkivuori", type: "Suoratoisto", genre: "Sarjat", desc: "Mysteeri 80-luvun lähiössä.", recommended: false },
            { id: 20, title: "Pohjolan laki", type: "Linear TV", genre: "Sarjat", desc: "Lakidraamaa Helsingin ytimessä.", recommended: false },
            { id: 21, title: "Succession", type: "Suoratoisto", genre: "Sarjat", desc: "Valtapeliä ja perhedraamaa miljardöörien maailmassa.", recommended: true },
            { id: 3, title: "Jääkiekon MM-finaali", type: "Linear TV", genre: "Urheilu", desc: "Jännitysnäytelmä suoraan areenalta.", recommended: true },
            { id: 10, title: "Formula 1: Monaco", type: "Linear TV", genre: "Urheilu", desc: "Kauden legendaarisin osakilpailu suorana.", recommended: false },
            { id: 22, title: "Huuhkajat: EM-karsinta", type: "Linear TV", genre: "Urheilu", desc: "Suomen maajoukkueen matka kohti kisoja.", recommended: true },
            { id: 23, title: "Wimbledon: Finaali", type: "Linear TV", genre: "Urheilu", desc: "Tenniksen kuninkuuskilpailu nurmikentillä.", recommended: false },
            { id: 24, title: "Valioliiga: Liverpool - ManU", type: "Suoratoisto", genre: "Urheilu", desc: "Klassikkokohtaaminen Englannin kentiltä.", recommended: false },
            { id: 5, title: "Muumilaakson tarinoita", type: "Suoratoisto", genre: "Lapset", desc: "Koko perheen suosikki Muumilaakson asukkaista.", recommended: false },
            { id: 13, title: "Ryhmä Hau", type: "Suoratoisto", genre: "Lapset", desc: "Sankarilliset pennut pelastavat päivän.", recommended: false },
            { id: 25, title: "Pipsa Possu", type: "Linear TV", genre: "Lapset", desc: "Pienen possun arkisia seikkailuja.", recommended: false },
            { id: 26, title: "Frozen II", type: "Vuokraelokuva", genre: "Lapset", desc: "Elsa ja Anna lähtevät kohti tuntematonta.", recommended: true },
            { id: 27, title: "Katti Matikainen", type: "Linear TV", genre: "Lapset", desc: "Hauska kissa ja kummalliset keksinnöt.", recommended: false },
            { id: 6, title: "Luonnon ihmeet", type: "Suoratoisto", genre: "Dokumentit", desc: "Upeasti kuvattu dokumenttisarja maapallon monimuotoisuudesta.", recommended: true },
            { id: 11, title: "Avara luonto", type: "Linear TV", genre: "Dokumentit", desc: "Viikoittainen matka luonnon salaisuuksiin.", recommended: false },
            { id: 28, title: "Suomi on metsäläinen", type: "Linear TV", genre: "Dokumentit", desc: "Tarina suomalaisten suhteesta metsään.", recommended: false },
            { id: 29, title: "David Attenborough: Elämä", type: "Suoratoisto", genre: "Dokumentit", desc: "Legendaarisen kertojan matka luonnon halki.", recommended: true },
            { id: 30, title: "Kosmos", type: "Suoratoisto", genre: "Dokumentit", desc: "Matka avaruuden ja ajan ääriin.", recommended: false },
            { id: 7, title: "Putous", type: "Linear TV", genre: "Viihde", desc: "Suomen suosituin sketsihahmokilpailu jatkuu.", recommended: false },
            { id: 15, title: "MasterChef Suomi", type: "Linear TV", genre: "Viihde", desc: "Kotikokit ottavat mittaa toisistaan keittiössä.", recommended: false },
            { id: 31, title: "Vain elämää", type: "Linear TV", genre: "Viihde", desc: "Artistit tulkitsevat toistensa kappaleita Hirvensalmella.", recommended: true },
            { id: 32, title: "Haluatko miljonääriksi?", type: "Linear TV", genre: "Viihde", desc: "Tietokilpailu, jossa panokset ovat huipussaan.", recommended: false },
            { id: 33, title: "Tanssii tähtien kanssa", type: "Linear TV", genre: "Viihde", desc: "Upeat tanssiesitykset ja tähtiloistoa.", recommended: true },
            { id: 2, title: "Uutiset 20:30", type: "Linear TV", genre: "Uutiset", desc: "Päivän tärkeimmät uutiset suorana lähetyksenä.", recommended: false },
            { id: 16, title: "A-studio", type: "Linear TV", genre: "Uutiset", desc: "Syvällistä keskustelua päivän polttavista aiheista.", recommended: false },
            { id: 34, title: "Yle Uutiset: Sää", type: "Linear TV", genre: "Uutiset", desc: "Tarkka sääennuste koko Suomeen.", recommended: false },
            { id: 35, title: "CNN International", type: "Suoratoisto", genre: "Uutiset", desc: "Maailmanlaajuiset uutiset 24/7.", recommended: false },
            { id: 36, title: "Urheiluruutu", type: "Linear TV", genre: "Uutiset", desc: "Päivän urheiluaiheet tiivistettynä.", recommended: false }
        ];

        let activeGenres = new Set();
        let activeServices = new Set();
        let favorites = new Set(JSON.parse(localStorage.getItem('favs') || '[]'));
        let customSections = JSON.parse(localStorage.getItem('customSections') || '[]');
        let sectionOrder = JSON.parse(localStorage.getItem('sectionOrder') || '["recommended", "favorites", "all"]');
        let hiddenSections = new Set(JSON.parse(localStorage.getItem('hiddenSections') || '[]'));
        let showOnlyFavorites = false;
        let highlightStreaming = false;

        const dynamicSectionsContainer = document.getElementById('dynamic-sections');
        const genreFiltersContainer = document.getElementById('genre-filters');
        const serviceChips = document.querySelectorAll('#service-filters .chip');
        const sidebarSectionsContainer = document.getElementById('sidebar-sections');

        function init() {
            renderGenreFilters();
            renderSidebarSections();
            renderContent();
            setupEventListeners();
        }

        function saveState() {
            localStorage.setItem('favs', JSON.stringify([...favorites]));
            localStorage.setItem('customSections', JSON.stringify(customSections));
            localStorage.setItem('sectionOrder', JSON.stringify(sectionOrder));
            localStorage.setItem('hiddenSections', JSON.stringify([...hiddenSections]));
        }

        function renderGenreFilters() {
            genreFiltersContainer.innerHTML = genres.map(g => `
                <div class="genre-item">
                    <div class="chip ${activeGenres.has(g) ? 'active' : ''}" data-value="${g}">${g}</div>
                    <button class="add-section-btn" data-genre="${g}" title="Lisää omaksi osioksi">+</button>
                </div>
            `).join('');
        }

        function getSectionTitle(id) {
            if (id === 'recommended') return "Suositellut sinulle";
            if (id === 'favorites') return "Omat suosikit";
            if (id === 'all') return "Kaikki sisällöt";
            if (id.startsWith('genre-')) return "Genre: " + id.replace('genre-', '');
            return id;
        }

        function renderSidebarSections() {
            // Varmistetaan että kaikki custom-osiot ovat mukana järjestyksessä
            customSections.forEach(g => {
                if (!sectionOrder.includes('genre-' + g)) sectionOrder.push('genre-' + g);
            });
            // Poistetaan ne joita ei enää ole
            sectionOrder = sectionOrder.filter(id => {
                if (id.startsWith('genre-')) return customSections.includes(id.replace('genre-', ''));
                return true;
            });

            sidebarSectionsContainer.innerHTML = sectionOrder.map(id => {
                const isCustom = id.startsWith('genre-');
                const isHidden = hiddenSections.has(id);
                return `
                    <div class="sidebar-section-item" draggable="true" data-id="${id}">
                        <span class="drag-handle">⠿</span>
                        <input type="checkbox" class="section-checkbox" ${!isHidden ? 'checked' : ''} data-id="${id}">
                        <span class="section-name" data-id="${id}">${getSectionTitle(id)}</span>
                        ${isCustom ? `<button class="sidebar-remove-btn" data-genre="${id.replace('genre-', '')}" title="Poista osio">🗑</button>` : ''}
                    </div>
                `;
            }).join('');
            
            setupSidebarDragAndDrop();
        }

        function renderContent() {
            dynamicSectionsContainer.innerHTML = '';
            
            sectionOrder.forEach(sectionId => {
                if (hiddenSections.has(sectionId)) return;

                let title = getSectionTitle(sectionId);
                let items = [];
                let isCustom = sectionId.startsWith('genre-');

                if (sectionId === 'recommended') items = contentItems.filter(i => i.recommended);
                else if (sectionId === 'favorites') items = contentItems.filter(i => favorites.has(i.id));
                else if (sectionId === 'all') items = contentItems;
                else if (isCustom) items = contentItems.filter(i => i.genre === sectionId.replace('genre-', ''));

                const filteredItems = items.filter(item => {
                    const genreMatch = activeGenres.size === 0 || activeGenres.has(item.genre);
                    const serviceMatch = activeServices.size === 0 || activeServices.has(item.type);
                    const favoriteMatch = !showOnlyFavorites || ["Elokuvat", "Urheilu"].includes(item.genre);
                    return genreMatch && serviceMatch && favoriteMatch;
                });

                const sectionEl = document.createElement('section');
                sectionEl.className = 'content-section';
                sectionEl.id = 'anchor-' + sectionId;
                
                sectionEl.innerHTML = `
                    <div class="section-header">
                        <h3>${title}</h3>
                    </div>
                    <div class="grid">
                        ${filteredItems.length > 0 ? filteredItems.map(item => createCardHtml(item)).join('') : '<div class="empty-state">Ei sisältöä valituilla suodattimilla.</div>'}
                    </div>
                `;
                dynamicSectionsContainer.appendChild(sectionEl);
            });
        }

        function createCardHtml(item) {
            const isFav = favorites.has(item.id);
            const isHighlighted = highlightStreaming && item.type === "Suoratoisto";
            return `
                <div class="card" style="${isHighlighted ? 'border: 2px solid var(--primary-color); background: #f0f7ff;' : ''}">
                    <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${item.id}">❤</button>
                    <div class="card-img" style="background-image: url('https://picsum.photos/seed/${item.id}/400/200')"></div>
                    <div class="card-content">
                        <div class="card-type">${item.type}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-genre">${item.genre}</div>
                        <div class="card-desc">${item.desc}</div>
                    </div>
                </div>
            `;
        }

        function setupEventListeners() {
            // Genre suodatus ja lisäys
            genreFiltersContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('chip')) {
                    const val = e.target.getAttribute('data-value');
                    if (activeGenres.has(val)) activeGenres.delete(val);
                    else activeGenres.add(val);
                    renderGenreFilters();
                    renderContent();
                }
                if (e.target.classList.contains('add-section-btn')) {
                    const genre = e.target.getAttribute('data-genre');
                    if (!customSections.includes(genre)) {
                        customSections.push(genre);
                        saveState();
                        renderSidebarSections();
                        renderContent();
                    }
                }
            });

            // Sivupalkin osioiden hallinta
            sidebarSectionsContainer.addEventListener('click', (e) => {
                // Navigointi
                if (e.target.classList.contains('section-name')) {
                    const id = e.target.getAttribute('data-id');
                    const target = document.getElementById('anchor-' + id);
                    if (target) target.scrollIntoView();
                }
                // Näkyvyys
                if (e.target.classList.contains('section-checkbox')) {
                    const id = e.target.getAttribute('data-id');
                    if (e.target.checked) hiddenSections.delete(id);
                    else hiddenSections.add(id);
                    saveState();
                    renderContent();
                }
                // Poisto
                if (e.target.classList.contains('sidebar-remove-btn')) {
                    const genre = e.target.getAttribute('data-genre');
                    customSections = customSections.filter(g => g !== genre);
                    sectionOrder = sectionOrder.filter(id => id !== 'genre-' + genre);
                    saveState();
                    renderSidebarSections();
                    renderContent();
                }
            });

            // Muut suodattimet
            serviceChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const val = chip.getAttribute('data-value');
                    if (activeServices.has(val)) activeServices.delete(val);
                    else activeServices.add(val);
                    chip.classList.toggle('active');
                    renderContent();
                });
            });

            document.getElementById('toggle-favorites').addEventListener('change', (e) => { showOnlyFavorites = e.target.checked; renderContent(); });
            document.getElementById('toggle-highlight').addEventListener('change', (e) => { highlightStreaming = e.target.checked; renderContent(); });

            // Suosikit korteissa
            dynamicSectionsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('fav-btn')) {
                    const id = parseInt(e.target.getAttribute('data-id'));
                    if (favorites.has(id)) favorites.delete(id);
                    else favorites.add(id);
                    saveState();
                    renderContent();
                    if (sectionOrder.includes('favorites')) renderContent();
                }
            });
        }

        function setupSidebarDragAndDrop() {
            const items = sidebarSectionsContainer.querySelectorAll('.sidebar-section-item');
            items.forEach(item => {
                item.addEventListener('dragstart', () => item.classList.add('dragging'));
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    items.forEach(i => i.classList.remove('drag-over'));
                    const newOrder = [...sidebarSectionsContainer.querySelectorAll('.sidebar-section-item')].map(i => i.getAttribute('data-id'));
                    sectionOrder = newOrder;
                    saveState();
                    renderContent();
                });
                item.addEventListener('dragover', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
                item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const dragging = sidebarSectionsContainer.querySelector('.dragging');
                    if (dragging && dragging !== item) {
                        const all = [...sidebarSectionsContainer.querySelectorAll('.sidebar-section-item')];
                        if (all.indexOf(dragging) < all.indexOf(item)) item.after(dragging);
                        else item.before(dragging);
                    }
                });
            });
        }

        init();
    </script>
</body>
</html>
